<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Collection | Useful Resources</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            border-radius: 12px;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 800px;
            margin: 0 auto;
        }

        .search-filter {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box {
            flex-grow: 1;
            max-width: 500px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #e1e5eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #2575fc;
            box-shadow: 0 0 0 3px rgba(37, 117, 252, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }

        .category-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 10px 20px;
            background-color: #fff;
            border: 2px solid #e1e5eb;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .category-btn:hover {
            border-color: #2575fc;
            color: #2575fc;
        }

        .category-btn.active {
            background-color: #2575fc;
            border-color: #2575fc;
            color: white;
        }

        .links-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .link-card {
            background-color: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            border-left: 5px solid #2575fc;
            display: flex;
            flex-direction: column;
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .link-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .link-icon {
            font-size: 1.8rem;
            color: #2575fc;
            margin-right: 15px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(37, 117, 252, 0.1);
            border-radius: 8px;
        }

        .link-title {
            font-size: 1.4rem;
            margin-bottom: 5px;
            color: #2c3e50;
        }

        .link-description {
            color: #666;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .link-url {
            display: inline-block;
            background-color: #f8f9fa;
            padding: 12px 18px;
            border-radius: 8px;
            text-decoration: none;
            color: #2575fc;
            font-weight: 600;
            transition: all 0.3s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            border: 1px solid #e1e5eb;
        }

        .link-url:hover {
            background-color: #2575fc;
            color: white;
        }

        .link-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
        }

        .link-category {
            background-color: #eef5ff;
            color: #2575fc;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #6c757d;
            border-top: 1px solid #e1e5eb;
        }

        .link-count {
            background-color: #2575fc;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .links-container {
                grid-template-columns: 1fr;
            }

            .search-filter {
                flex-direction: column;
            }

            .search-box {
                max-width: 100%;
            }

            h1 {
                font-size: 2.2rem;
            }
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #dee2e6;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1><i class="fas fa-link"></i> Link Collection</h1>
        <p class="subtitle">A curated collection of useful resources and tools for developers, designers, and content creators. Filter by category or search for specific links.</p>
    </header>

    <div class="search-filter">
        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search links by title, description, or category...">
        </div>

        <div class="category-filter">
            <button class="category-btn active" data-category="all">All Links</button>
            <button class="category-btn" data-category="development">Development</button>
            <button class="category-btn" data-category="design">Design</button>
            <button class="category-btn" data-category="productivity">Productivity</button>
            <button class="category-btn" data-category="learning">Learning</button>
        </div>
    </div>

    <div class="links-container" id="linksContainer">
        <!-- Link cards will be dynamically inserted here -->
    </div>

    <footer>
        <p>Link Collection &copy; <span id="currentYear"></span> |
            <span id="totalLinks">0</span> links available |
            Made with <i class="fas fa-heart" style="color: #e74c3c;"></i> for easy access to resources</p>
    </footer>
</div>

<script>
    // Sample link data
    const links = [
        {
            id: 1,
            title: "MDN Web Docs",
            description: "Comprehensive documentation for web technologies including HTML, CSS, JavaScript and more.",
            url: "https://developer.mozilla.org",
            category: "development",
            icon: "fas fa-code"
        },
        {
            id: 2,
            title: "CSS Tricks",
            description: "Tips, tricks, and techniques for using CSS, along with articles and tutorials.",
            url: "https://css-tricks.com",
            category: "design",
            icon: "fas fa-paint-brush"
        },
        {
            id: 3,
            title: "GitHub",
            description: "Platform for version control and collaboration. Host and review code, manage projects, and build software.",
            url: "https://github.com",
            category: "development",
            icon: "fas fa-code-branch"
        },
        {
            id: 4,
            title: "Stack Overflow",
            description: "Community-driven Q&A platform for programmers to find solutions to coding problems.",
            url: "https://stackoverflow.com",
            category: "development",
            icon: "fas fa-question-circle"
        },
        {
            id: 5,
            title: "Figma",
            description: "Collaborative interface design tool that works in the browser and on desktop.",
            url: "https://figma.com",
            category: "design",
            icon: "fas fa-palette"
        },
        {
            id: 6,
            title: "Notion",
            description: "All-in-one workspace for notes, tasks, wikis, and databases to organize your work.",
            url: "https://notion.so",
            category: "productivity",
            icon: "fas fa-tasks"
        },
        {
            id: 7,
            title: "freeCodeCamp",
            description: "Interactive learning platform with free coding lessons and projects to build your portfolio.",
            url: "https://freecodecamp.org",
            category: "learning",
            icon: "fas fa-graduation-cap"
        },
        {
            id: 8,
            title: "Coolors",
            description: "Color scheme generator that helps create perfect color palettes for your designs.",
            url: "https://coolors.co",
            category: "design",
            icon: "fas fa-fill-drip"
        },
        {
            id: 9,
            title: "Trello",
            description: "Visual collaboration tool that organizes your projects into boards for productivity.",
            url: "https://trello.com",
            category: "productivity",
            icon: "fas fa-columns"
        },
        {
            id: 10,
            title: "Codepen",
            description: "Online code editor and front-end web development community for testing and showcasing code snippets.",
            url: "https://codepen.io",
            category: "development",
            icon: "fas fa-laptop-code"
        },
        {
            id: 11,
            title: "Coursera",
            description: "Online learning platform offering courses, certificates, and degrees from world-class universities.",
            url: "https://coursera.org",
            category: "learning",
            icon: "fas fa-university"
        },
        {
            id: 12,
            title: "Unsplash",
            description: "High-quality, freely usable images contributed by photographers from around the world.",
            url: "https://unsplash.com",
            category: "design",
            icon: "fas fa-camera"
        }
    ];

    // DOM elements
    const linksContainer = document.getElementById('linksContainer');
    const searchInput = document.getElementById('searchInput');
    const categoryButtons = document.querySelectorAll('.category-btn');
    const totalLinksElement = document.getElementById('totalLinks');

    // Set current year in footer
    document.getElementById('currentYear').textContent = new Date().getFullYear();

    // Initialize display
    let filteredLinks = [...links];
    let activeCategory = 'all';

    function renderLinks() {
        linksContainer.innerHTML = '';

        if (filteredLinks.length === 0) {
            linksContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>No links found</h3>
                        <p>Try adjusting your search or filter to find what you're looking for.</p>
                    </div>
                `;
            return;
        }

        filteredLinks.forEach(link => {
            const linkCard = document.createElement('div');
            linkCard.className = 'link-card';
            linkCard.setAttribute('data-category', link.category);

            linkCard.innerHTML = `
                    <div class="link-header">
                        <div class="link-icon">
                            <i class="${link.icon}"></i>
                        </div>
                        <div>
                            <h3 class="link-title">${link.title}</h3>
                            <p class="link-description">${link.description}</p>
                        </div>
                    </div>
                    <a href="${link.url}" target="_blank" class="link-url">
                        <i class="fas fa-external-link-alt"></i> ${link.url.replace('https://', '')}
                    </a>
                    <div class="link-footer">
                        <span class="link-category">${link.category.charAt(0).toUpperCase() + link.category.slice(1)}</span>
                        <span><i class="far fa-star"></i> Bookmark</span>
                    </div>
                `;

            linksContainer.appendChild(linkCard);
        });

        // Update total links count
        totalLinksElement.textContent = filteredLinks.length;
    }

    // Filter links by category
    function filterByCategory(category) {
        activeCategory = category;

        if (category === 'all') {
            filteredLinks = [...links];
        } else {
            filteredLinks = links.filter(link => link.category === category);
        }

        // Apply search filter on top of category filter
        const searchTerm = searchInput.value.toLowerCase();
        if (searchTerm) {
            filteredLinks = filteredLinks.filter(link =>
                link.title.toLowerCase().includes(searchTerm) ||
                link.description.toLowerCase().includes(searchTerm) ||
                link.category.toLowerCase().includes(searchTerm)
            );
        }

        renderLinks();
    }

    // Search functionality
    function searchLinks() {
        const searchTerm = searchInput.value.toLowerCase();

        // Start with all links or category filtered links
        if (activeCategory === 'all') {
            filteredLinks = [...links];
        } else {
            filteredLinks = links.filter(link => link.category === activeCategory);
        }

        // Apply search filter
        if (searchTerm) {
            filteredLinks = filteredLinks.filter(link =>
                link.title.toLowerCase().includes(searchTerm) ||
                link.description.toLowerCase().includes(searchTerm) ||
                link.category.toLowerCase().includes(searchTerm)
            );
        }

        renderLinks();
    }

    // Event listeners
    searchInput.addEventListener('input', searchLinks);

    categoryButtons.forEach(button => {
        button.addEventListener('click', function() {
            // Update active button
            categoryButtons.forEach(btn => btn.classList.remove('active'));
            this.classList.add('active');

            // Filter links
            const category = this.getAttribute('data-category');
            filterByCategory(category);
        });
    });

    // Initialize with all links
    filterByCategory('all');

    // Bonus: Add click animation to link cards
    document.addEventListener('click', function(e) {
        if (e.target.closest('.link-card')) {
            const card = e.target.closest('.link-card');
            card.style.transform = 'scale(0.98)';
            setTimeout(() => {
                card.style.transform = '';
            }, 200);
        }
    });
</script>
</body>
</html>
