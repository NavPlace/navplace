<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavPlace Theme</title>
    <style>
        :root {
            --background: #ffffff;
            --text: #000000;
            --input-bg: #f0f0f0;
            --input-border: #cccccc;
            --link-hover: #e0e0e0;
            --accent: #333333;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background: #121212;
                --text: #ffffff;
                --input-bg: #1e1e1e;
                --input-border: #444444;
                --link-hover: #333333;
                --accent: #dddddd;
            }
        }

        [data-theme="light"] {
            --background: #ffffff;
            --text: #000000;
            --input-bg: #f0f0f0;
            --input-border: #cccccc;
            --link-hover: #e0e0e0;
            --accent: #333333;
        }

        [data-theme="dark"] {
            --background: #121212;
            --text: #ffffff;
            --input-bg: #1e1e1e;
            --input-border: #444444;
            --link-hover: #333333;
            --accent: #dddddd;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #theme-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text);
            padding: 5px;
            font-size: 14px;
        }

        #search {
            width: 100%;
            max-width: 600px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        #results {
            width: 100%;
            max-width: 1200px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
        }

        .item {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text);
            background-color: var(--input-bg);
            padding: 10px;
            border: 1px solid var(--input-border);
            font-size: 14px;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item:hover {
            background-color: var(--link-hover);
        }

        .item-icon {
            width: 16px;
            height: 16px;
            margin-right: 5px;
            vertical-align: middle;
        }

        .item-image {
            margin-left: auto;
            width: 40px;
            height: 40px;
            object-fit: cover;
            margin-right: 5px;
            vertical-align: middle;
        }

        .item-label {
            vertical-align: middle;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<select id="theme-switch">
    <option value="system">System</option>
    <option value="light">Light</option>
    <option value="dark">Dark</option>
</select>
<input type="search" id="search" placeholder="Search operational links...">
<div id="results"></div>

<script src="../../lib/navplace.js"></script>
<script>
    function update(items) {
        const container = document.getElementById('results');
        container.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'results-grid';
        items.forEach(item => {
            const a = document.createElement('a');
            a.href = item.href;
            a.className = 'item';
            if (item.icon_url) {
                const icon = document.createElement('img');
                icon.src = item.icon_url;
                icon.alt = '';
                icon.className = 'item-icon';
                a.appendChild(icon);
            }
            const label = document.createElement('span');
            label.textContent = item.label;
            label.className = 'item-label';
            a.appendChild(label);
            if (item.image_url) {
                const image = document.createElement('img');
                image.src = item.image_url;
                image.alt = '';
                image.className = 'item-image';
                a.appendChild(image);
            }
            grid.appendChild(a);
        });
        container.appendChild(grid);
    }

    if (typeof navplace === 'function') {
        navplace({
            input: '#search',
            update: update
        });
    }

    const themeSwitch = document.getElementById('theme-switch');
    let currentTheme = localStorage.getItem('theme') || 'system';
    themeSwitch.value = currentTheme;

    function setTheme(theme) {
        if (theme === 'system') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', theme);
        }
        localStorage.setItem('theme', theme);
    }

    themeSwitch.addEventListener('change', (e) => {
        setTheme(e.target.value);
    });

    setTheme(currentTheme);
</script>
</body>
</html>
