<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavPlace Operational Theme</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f4f4f5;
            --text-primary: #18181b;
            --text-secondary: #71717a;
            --border: #e4e4e7;
            --accent: #2563eb;
            --hover: #f1f5f9;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #09090b;
                --bg-secondary: #18181b;
                --text-primary: #fafafa;
                --text-secondary: #a1a1aa;
                --border: #27272a;
                --accent: #3b82f6;
                --hover: #1e1e21;
            }
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f4f4f5;
            --text-primary: #18181b;
            --text-secondary: #71717a;
            --border: #e4e4e7;
            --hover: #f1f5f9;
        }

        [data-theme="dark"] {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --border: #27272a;
            --hover: #1e1e21;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.4;
        }

        .ops-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .search-wrapper {
            flex-grow: 1;
            max-width: 400px;
        }

        input[type="search"] {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 4px;
            outline: none;
            font-family: var(--font-mono);
        }

        input[type="search"]:focus {
            border-color: var(--accent);
        }

        .theme-toggle {
            display: flex;
            gap: 4px;
            margin-left: 1rem;
        }

        .btn-ui {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 8px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .btn-ui:hover { background: var(--hover); color: var(--text-primary); }

        /* Grid Results */
        #navplace-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1px;
            background-color: var(--border);
            border: 1px solid var(--border);
        }

        .nav-item {
            background-color: var(--bg-primary);
            display: flex;
            align-items: center;
            padding: 8px 12px;
            text-decoration: none;
            color: inherit;
            transition: background 0.1s ease;
        }

        .nav-item:hover {
            background-color: var(--hover);
        }

        .nav-icon {
            width: 16px;
            height: 16px;
            margin-right: 12px;
            flex-shrink: 0;
            filter: grayscale(1);
        }

        .nav-item:hover .nav-icon {
            filter: none;
        }

        .nav-content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .nav-label {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-href {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-image {
            width: 32px;
            height: 32px;
            margin-left: auto;
            border-radius: 2px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .empty-state {
            grid-column: 1 / -1;
            padding: 40px;
            text-align: center;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-family: var(--font-mono);
        }

        @media (max-width: 600px) {
            #navplace-results { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="ops-container">
    <header>
        <div class="search-wrapper">
            <input type="search" id="ops-search" placeholder="Filter operational nodes..." spellcheck="false">
        </div>
        <div class="theme-toggle">
            <button class="btn-ui" onclick="setTheme('light')">Light</button>
            <button class="btn-ui" onclick="setTheme('dark')">Dark</button>
            <button class="btn-ui" onclick="setTheme('system')">Auto</button>
        </div>
    </header>

    <main id="navplace-results">
        <div class="empty-state">System standby. Awaiting input...</div>
    </main>
</div>

<script src="../../lib/navplace.js"></script>
<script>
    function setTheme(theme) {
        if (theme === 'system') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', theme);
        }
    }

    const resultsContainer = document.getElementById('navplace-results');

    function renderItems(items) {
        if (!items || items.length === 0) {
            resultsContainer.innerHTML = '<div class="empty-state">No matching operational records found.</div>';
            return;
        }

        resultsContainer.innerHTML = items.map(item => `
            <a href="${item.href}" class="nav-item" target="_blank" rel="noopener noreferrer">
                <img src="${item.icon_url}" class="nav-icon" onerror="this.style.display='none'">
                <div class="nav-content">
                    <span class="nav-label">${item.label}</span>
                    <span class="nav-href">${item.href}</span>
                </div>
                ${item.image_url ? `<img src="${item.image_url}" class="nav-image">` : ''}
            </a>
        `).join('');
    }

    // Initialize NavPlace
    // Assuming navplace runtime is available globally
    if (typeof navplace === 'function') {
        navplace({
            input: '#ops-search',
            update: (items) => renderItems(items)
        });
    } else {
        console.error('NavPlace runtime not detected.');
    }
</script>

</body>
</html>
