<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavPlace Kids</title>
    <style>
        :root {
            --primary: #6CB4EE;
            --secondary: #FFB347;
            --accent: #77DD77;
            --background: #FFF9F0;
            --card-bg: #FFFFFF;
            --text: #333333;
            --shadow: rgba(0, 0, 0, 0.1);
            --radius: 20px;
            --spacing: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
            background: var(--background);
            color: var(--text);
            padding: var(--spacing);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 var(--secondary);
        }

        .tagline {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 30px;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .search-input {
            width: 100%;
            padding: 20px 30px;
            font-size: 1.4rem;
            border: 4px solid var(--primary);
            border-radius: 50px;
            background: white;
            color: var(--text);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 180, 238, 0.2);
        }

        .search-input::placeholder {
            color: #aaa;
        }

        .results-count {
            text-align: center;
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 30px;
            padding: 10px;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 10px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 25px;
            text-decoration: none;
            color: var(--text);
            display: block;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .item-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 15px 30px var(--shadow);
        }

        .item-card:active {
            transform: translateY(-4px) scale(1.01);
        }

        .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
        }

        .icon-container {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border: 5px solid white;
            box-shadow: 0 8px 16px var(--shadow);
        }

        .item-icon {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 12px;
        }

        .item-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 10px;
            display: none;
        }

        .item-card.has-image .item-image {
            display: block;
        }

        .item-label {
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1.3;
            color: var(--primary);
            word-break: break-word;
        }

        .item-meta {
            font-size: 1.2rem;
            color: var(--secondary);
            line-height: 1.4;
        }

        .item-href {
            font-size: 1rem;
            color: #888;
            word-break: break-all;
            margin-top: 10px;
            opacity: 0.7;
        }

        .no-items {
            text-align: center;
            font-size: 2rem;
            color: var(--secondary);
            padding: 60px 20px;
            grid-column: 1 / -1;
        }

        .card-decoration {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--secondary);
            border-radius: 50%;
            opacity: 0.1;
            z-index: 0;
        }

        .decoration-1 { top: -20px; right: -20px; }
        .decoration-2 { bottom: -30px; left: -30px; background: var(--accent); }

        @media (max-width: 768px) {
            .items-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }

            .logo {
                font-size: 2.8rem;
            }

            .search-input {
                font-size: 1.2rem;
                padding: 18px 25px;
            }
        }

        @media (max-width: 480px) {
            .items-grid {
                grid-template-columns: 1fr;
            }

            body {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1 class="logo">NavPlace Kids</h1>
        <p class="tagline">Find fun places to explore!</p>
    </header>

    <div class="search-container">
        <input type="search" class="search-input" placeholder="What are you looking for?">
    </div>

    <div class="results-count">Found <span id="count">0</span> places</div>

    <div class="items-grid" id="items-container">
        <div class="no-items">Type in the search box to find fun places!</div>
    </div>
</div>

<script src="../../lib/navplace.js"></script>
<script>
    (function() {
        const itemsContainer = document.getElementById('items-container');
        const countElement = document.getElementById('count');
        const searchInput = document.querySelector('.search-input');
        let currentItems = [];

        function updateItems(items) {
            currentItems = items || [];
            countElement.textContent = currentItems.length;

            if (currentItems.length === 0) {
                itemsContainer.innerHTML = '<div class="no-items">No places found. Try a different search!</div>';
                return;
            }

            const itemsHTML = currentItems.map(item => {
                const hasImage = item.image_url && item.image_url.trim() !== '';
                return `
                        <a href="${item.href}" class="item-card ${hasImage ? 'has-image' : ''}" target="_blank">
                            <div class="card-decoration decoration-1"></div>
                            <div class="card-decoration decoration-2"></div>
                            <div class="card-content">
                                ${hasImage ? `<img src="${item.image_url}" alt="" class="item-image" loading="lazy">` : ''}
                                <div class="icon-container">
                                    <img src="${item.icon_url}" alt="" class="item-icon" loading="lazy" onerror="this.style.display='none'">
                                </div>
                                <div class="item-label">${escapeHTML(item.label)}</div>
                                ${item.meta ? `<div class="item-meta">${escapeHTML(formatMeta(item.meta))}</div>` : ''}
                                <div class="item-href">${new URL(item.href).hostname}</div>
                            </div>
                        </a>
                    `;
            }).join('');

            itemsContainer.innerHTML = itemsHTML;
        }

        function escapeHTML(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatMeta(meta) {
            if (typeof meta === 'object') {
                return Object.entries(meta)
                    .map(([key, value]) => `${key}: ${value}`)
                    .join(' • ');
            }
            return String(meta);
        }

        function initializeNavPlace() {
            if (typeof navplace === 'function') {
                navplace({
                    input: searchInput,
                    update: updateItems
                });
            } else {
                console.warn('NavPlace runtime not loaded yet');

                setTimeout(initializeNavPlace, 100);
            }
        }

        window.addEventListener('DOMContentLoaded', initializeNavPlace);

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeNavPlace);
        } else {
            initializeNavPlace();
        }
    })();
</script>
</body>
</html>
